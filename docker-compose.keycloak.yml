services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: lakeshore-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import:ro
