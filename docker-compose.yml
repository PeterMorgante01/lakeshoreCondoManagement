services:
  mongo:
    image: mongo:7
    container_name: lakeshore-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - lakeshore-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    container_name: lakeshore-keycloak
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8081:8080"
    volumes:
      - ./infra/keycloak/realm-import:/opt/keycloak/data/import:ro
    networks:
      - lakeshore-net

  auth-service:
    build:
      context: ./backend
    container_name: lakeshore-auth-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVICE_ROLE: auth
      AUTH_MODE: ${AUTH_MODE:-jwt}
      MONGO_URI: mongodb://mongo:27017/lakeshoreCondoManagement
      JWT_SECRET: ${JWT_SECRET:-change_me_phase3}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BOOTSTRAP_MANAGER_NAME: ${BOOTSTRAP_MANAGER_NAME:-Manager}
      BOOTSTRAP_MANAGER_EMAIL: ${BOOTSTRAP_MANAGER_EMAIL:-manager@lakeshore.local}
      BOOTSTRAP_MANAGER_PASSWORD: ${BOOTSTRAP_MANAGER_PASSWORD:-Manager123!}
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-lakeshore}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-property-rental-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_BEARER_ONLY: ${KEYCLOAK_BEARER_ONLY:-true}
      KEYCLOAK_PUBLIC_CLIENT: ${KEYCLOAK_PUBLIC_CLIENT:-false}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_session_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongo
      - keycloak
    networks:
      - lakeshore-net

  core-service:
    build:
      context: ./backend
    container_name: lakeshore-core-service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      SERVICE_ROLE: core
      AUTH_MODE: ${AUTH_MODE:-jwt}
      MONGO_URI: mongodb://mongo:27017/lakeshoreCondoManagement
      JWT_SECRET: ${JWT_SECRET:-change_me_phase3}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BOOTSTRAP_MANAGER_NAME: ${BOOTSTRAP_MANAGER_NAME:-Manager}
      BOOTSTRAP_MANAGER_EMAIL: ${BOOTSTRAP_MANAGER_EMAIL:-manager@lakeshore.local}
      BOOTSTRAP_MANAGER_PASSWORD: ${BOOTSTRAP_MANAGER_PASSWORD:-Manager123!}
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-lakeshore}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-property-rental-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-}
      KEYCLOAK_BEARER_ONLY: ${KEYCLOAK_BEARER_ONLY:-true}
      KEYCLOAK_PUBLIC_CLIENT: ${KEYCLOAK_PUBLIC_CLIENT:-false}
      SESSION_SECRET: ${SESSION_SECRET:-change_me_session_secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      - mongo
      - keycloak
    networks:
      - lakeshore-net

  api-gateway:
    image: nginx:1.27-alpine
    container_name: lakeshore-api-gateway
    restart: unless-stopped
    depends_on:
      - auth-service
      - core-service
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - lakeshore-net

  frontend:
    build:
      context: ./frontend
    container_name: lakeshore-frontend
    restart: unless-stopped
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks:
      - lakeshore-net

  ollama:
    image: ollama/ollama:latest
    container_name: lakeshore-ollama
    restart: unless-stopped
    profiles:
      - ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - lakeshore-net

volumes:
  mongo_data:
  ollama_data:

networks:
  lakeshore-net:
    driver: bridge
